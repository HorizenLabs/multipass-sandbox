#cloud-config
# Multi Pass Sandbox — Base cloud-init template
# Installs: Docker (official repo), Node.js (nvm), Python (uv), Go, Rust, dev tools,
#           Solana CLI, Anchor, Foundry, Hardhat,
#           Solidity security (Slither, solc-select, Mythril, Halmos, Solhint, Aderyn,
#           Echidna, Medusa),
#           AI coding assistants (Claude Code, Crush, OpenCode, Gemini CLI, Codex CLI)
# Checksums verified: yq (SHA-256), hadolint (SHA-256), cosign (SHA-256),
#                    Echidna (sigstore via cosign)

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common
  # Build toolchain
  - build-essential
  - pkg-config
  - autoconf
  - automake
  - libtool
  - clang
  - llvm
  - libclang-dev
  - cmake
  - just
  # Core CLI tools
  - git
  - curl
  - wget
  - jq
  - unzip
  - zip
  - xz-utils
  # Dev tools
  - tmux
  - htop
  - tree
  - ripgrep
  - fd-find
  - vim
  - nano
  - zsh
  # SSL/crypto libs (needed by many build systems)
  - libssl-dev
  - libffi-dev
  - zlib1g-dev
  - libbz2-dev
  - libreadline-dev
  - libsqlite3-dev
  - libncurses-dev
  - libxml2-dev
  - libxmlsec1-dev
  - liblzma-dev
  - libudev-dev
  # Python
  - python3
  - python3-pip
  - python3-venv
  # Protobuf (needed by some blockchain tools)
  - protobuf-compiler
  - libprotobuf-dev
  # HWE edge kernel (newer than default)
  - linux-virtual-hwe-24.04-edge

groups:
  - docker

users:
  - default

runcmd:
  # ---------- Docker (official repo) ----------
  - |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
    apt-get update
    apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
    systemctl enable docker
    systemctl start docker
    usermod -aG docker ubuntu

  # ---------- Neovim (latest stable via PPA) ----------
  - |
    add-apt-repository -y ppa:neovim-ppa/stable
    apt-get update
    apt-get install -y neovim

  # ---------- yq (SHA256-verified) ----------
  - |
    YQ_VERSION=$(curl -fsSL https://api.github.com/repos/mikefarah/yq/releases/latest | grep tag_name | cut -d '"' -f 4)
    ARCH=$(dpkg --print-architecture)
    YQ_FILE="yq_linux_${ARCH}"
    curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_FILE}" -o /tmp/"${YQ_FILE}"
    curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/checksums" -o /tmp/yq_checksums
    EXPECTED=$(awk "/^${YQ_FILE} /{print \$19}" /tmp/yq_checksums)
    echo "${EXPECTED}  /tmp/${YQ_FILE}" | sha256sum -c -
    install -m 755 /tmp/"${YQ_FILE}" /usr/local/bin/yq
    rm /tmp/"${YQ_FILE}" /tmp/yq_checksums

  # ---------- shellcheck ----------
  - |
    SC_VERSION=$(curl -fsSL https://api.github.com/repos/koalaman/shellcheck/releases/latest | grep tag_name | cut -d '"' -f 4)
    ARCH=$(uname -m)
    curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${SC_VERSION}/shellcheck-${SC_VERSION}.linux.${ARCH}.tar.xz" | tar -xJf - --strip-components=1 -C /usr/local/bin "shellcheck-${SC_VERSION}/shellcheck"
    chmod +x /usr/local/bin/shellcheck

  # ---------- hadolint (SHA256-verified) ----------
  - |
    HL_VERSION=$(curl -fsSL https://api.github.com/repos/hadolint/hadolint/releases/latest | grep tag_name | cut -d '"' -f 4)
    ARCH=$(dpkg --print-architecture)
    if [ "$ARCH" = "amd64" ]; then HL_ARCH="x86_64"; else HL_ARCH="arm64"; fi
    HL_FILE="hadolint-Linux-${HL_ARCH}"
    curl -fsSL "https://github.com/hadolint/hadolint/releases/download/${HL_VERSION}/${HL_FILE}" -o /tmp/"${HL_FILE}"
    curl -fsSL "https://github.com/hadolint/hadolint/releases/download/${HL_VERSION}/${HL_FILE}.sha256" -o /tmp/"${HL_FILE}.sha256"
    echo "$(awk '{print $1}' /tmp/"${HL_FILE}.sha256")  /tmp/${HL_FILE}" | sha256sum -c -
    install -m 755 /tmp/"${HL_FILE}" /usr/local/bin/hadolint
    rm /tmp/"${HL_FILE}" /tmp/"${HL_FILE}.sha256"

  # ---------- cosign (SHA256-verified, sigstore verification tool) ----------
  - |
    ARCH=$(dpkg --print-architecture)
    COSIGN_VERSION=$(curl -fsSL https://api.github.com/repos/sigstore/cosign/releases/latest | grep tag_name | cut -d '"' -f 4)
    COSIGN_FILE="cosign-linux-${ARCH}"
    curl -fsSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/${COSIGN_FILE}" -o /tmp/"${COSIGN_FILE}"
    curl -fsSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign_checksums.txt" -o /tmp/cosign_checksums.txt
    grep "${COSIGN_FILE}" /tmp/cosign_checksums.txt | sed "s|${COSIGN_FILE}|/tmp/${COSIGN_FILE}|" | sha256sum -c -
    install -m 755 /tmp/"${COSIGN_FILE}" /usr/local/bin/cosign
    rm /tmp/"${COSIGN_FILE}" /tmp/cosign_checksums.txt

  # ---------- Node.js via nvm + bun (as ubuntu user) ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/master/install.sh | bash
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
      nvm install --lts
      nvm alias default lts/*
      # Install bun runtime
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      # Install global package managers via bun
      bun install -g pnpm yarn
    '

  # ---------- Go (latest stable from golang.org) ----------
  - |
    ARCH=$(dpkg --print-architecture)
    GO_VERSION=$(curl -fsSL "https://go.dev/dl/?mode=json" | jq -r ".[0].version")
    curl -fsSL "https://go.dev/dl/${GO_VERSION}.linux-${ARCH}.tar.gz" | tar -C /usr/local -xzf -
    # Add to system-wide profile
    printf '%s\n' \
      'export PATH=$PATH:/usr/local/go/bin' \
      'export GOPATH=$HOME/go' \
      'export PATH=$PATH:$GOPATH/bin' \
      > /etc/profile.d/golang.sh
    chmod +x /etc/profile.d/golang.sh

  # ---------- Rust via rustup (as ubuntu user) ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      source "$HOME/.cargo/env"
      cargo install cargo-audit
    '

  # ---------- Python: uv ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      curl -LsSf https://astral.sh/uv/install.sh | sh
    '

  # ---------- Solana CLI + Anchor ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      source "$HOME/.cargo/env"
      # Solana CLI
      sh -c "$(curl -fsSL https://release.anza.xyz/stable/install)"
      echo "export PATH=\"\$HOME/.local/share/solana/install/active_release/bin:\$PATH\"" >> "$HOME/.bashrc"
      # Anchor
      cargo install --git https://github.com/coral-xyz/anchor avm --force
      source "$HOME/.cargo/env"
      avm install latest
      avm use latest
    '

  # ---------- Foundry (forge, cast, anvil, chisel) ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      curl -fsSL https://foundry.paradigm.xyz | bash
      source "$HOME/.bashrc"
      "$HOME/.foundry/bin/foundryup"
    '

  # ---------- Hardhat (via bun) ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      export PATH="$HOME/.bun/bin:$PATH"
      bun install -g hardhat
    '

  # ---------- Solidity security: static analysis (via uv) ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      export PATH="$HOME/.local/bin:$PATH"
      uv tool install slither-analyzer
      uv tool install solc-select
      uv tool install mythril
      uv tool install halmos
    '

  # ---------- Solidity security: solhint linter (via bun) ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      export PATH="$HOME/.bun/bin:$PATH"
      bun install -g solhint
    '

  # ---------- Solidity security: Aderyn (Cyfrin installer) ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      curl --proto "=https" --tlsv1.2 -LsSf https://github.com/cyfrin/aderyn/releases/latest/download/aderyn-installer.sh | bash
    '

  # ---------- Solidity security: Echidna fuzzer (sigstore-verified) ----------
  - |
    ARCH=$(uname -m)
    EC_VERSION=$(curl -fsSL https://api.github.com/repos/crytic/echidna/releases/latest | grep tag_name | cut -d '"' -f 4)
    EC_FILE="echidna-${EC_VERSION#v}-${ARCH}-linux.tar.gz"
    curl -fsSL "https://github.com/crytic/echidna/releases/download/${EC_VERSION}/${EC_FILE}" -o /tmp/"${EC_FILE}"
    curl -fsSL "https://github.com/crytic/echidna/releases/download/${EC_VERSION}/${EC_FILE}.sigstore.json" -o /tmp/"${EC_FILE}.sigstore.json"
    cosign verify-blob \
      --bundle /tmp/"${EC_FILE}.sigstore.json" \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      --certificate-identity-regexp '^https://github\.com/crytic/echidna/.+' \
      /tmp/"${EC_FILE}"
    tar -xzf /tmp/"${EC_FILE}" -C /usr/local/bin
    chmod +x /usr/local/bin/echidna
    rm /tmp/"${EC_FILE}" /tmp/"${EC_FILE}.sigstore.json"

  # ---------- Solidity security: Medusa fuzzer (via go install) ----------
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH"
      export GOPATH="$HOME/go"
      go install github.com/crytic/medusa@latest
    '

  # ---------- AI coding assistants ----------
  # Claude Code (native binary installer)
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      curl -fsSL https://claude.ai/install.sh | bash
    '
  # Crush, OpenCode, Gemini CLI, Codex CLI (via bun)
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      export PATH="$HOME/.bun/bin:$PATH"
      bun install -g @charmland/crush opencode-ai @google/gemini-cli @openai/codex
    '

  # ---------- Final: ensure ubuntu owns its home ----------
  - chown -R ubuntu:ubuntu /home/ubuntu

final_message: "MPS base sandbox provisioning complete."
