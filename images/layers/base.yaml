#cloud-config
# MPS Layer: base
# Ubuntu 24.04 + Docker + Node.js + Python + dev tools + AI coding assistants

x-mps:
  description: "Ubuntu 24.04 + Docker + Node.js + Python + dev tools + AI assistants"
  disk_size: 8G
  min_profile: micro
  min_disk: 10G
  min_memory: 1G
  min_cpus: 1

write_files:
  - path: /etc/apt/apt.conf.d/90-always-phased-updates
    content: |
      APT::Get::Always-Include-Phased-Updates "true";

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common
  - just
  # Core CLI tools
  - git
  - curl
  - wget
  - jq
  - unzip
  - zip
  - xz-utils
  - pv
  - p7zip-full
  # Dev tools
  - tmux
  - htop
  - tree
  - ripgrep
  - fd-find
  - vim
  - nano
  - zsh
  - screen
  # Snap / mount support
  - snapd
  # Python
  - python3
  - python3-venv

groups:
  - docker

users:
  - default

final_message: "MPS base image provisioning complete."
