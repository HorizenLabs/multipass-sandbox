#cloud-config
# MPS Layer: protocol-dev
# C/C++ build toolchain + Go + Rust (on top of base)

x-mps:
  description: "base + C/C++ toolchain + Go + Rust"
  disk_size: 11G
  min_profile: lite
  min_disk: 15G
  min_memory: 2G
  min_cpus: 2

package_update: true

packages:
  - build-essential
  - python3-pip
  - pkg-config
  - autoconf
  - automake
  - libtool
  - clang
  - llvm
  - libclang-dev
  - lld
  - cmake
  # SSL/crypto libs (needed by many build systems)
  - libssl-dev
  - libffi-dev
  - zlib1g-dev
  - libbz2-dev
  - libreadline-dev
  - libsqlite3-dev
  - libncurses-dev
  - libxml2-dev
  - libxmlsec1-dev
  - liblzma-dev
  - libzstd-dev
  - libsquashfs-dev
  - libudev-dev
  # Protobuf (needed by some blockchain tools)
  - protobuf-compiler
  - libprotobuf-dev

final_message: "MPS protocol-dev image provisioning complete."
