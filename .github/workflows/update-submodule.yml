name: Update Submodule

on:
  schedule:
    # Weekdays 14:00 UTC — 9 AM EST / 3 PM CET
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-submodule:
    runs-on: warp-ubuntu-latest-x64-2x
    environment: submodule
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup submodule
        env:
          DEPLOY_KEY: ${{ secrets.SUBMODULE_DEPLOY_KEY }}
        run: bash .github/scripts/ci-setup-submodule.sh

      - name: Check for submodule updates
        id: check
        run: |
          cd vendor/hl-claude-marketplace
          OLD_SHA="$(git rev-parse HEAD)"
          git fetch origin main
          NEW_SHA="$(git rev-parse origin/main)"

          if [[ "$OLD_SHA" == "$NEW_SHA" ]]; then
            echo "Submodule already up to date ($OLD_SHA)"
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            COUNT="$(git rev-list --count "${OLD_SHA}..${NEW_SHA}")"
            {
              echo "has_updates=true"
              echo "old_sha=${OLD_SHA:0:7}"
              echo "new_sha=${NEW_SHA:0:7}"
              echo "commit_count=$COUNT"
            } >> "$GITHUB_OUTPUT"
            echo "${COUNT} new commit(s): ${OLD_SHA:0:7} → ${NEW_SHA:0:7}"
          fi

      - name: Check for existing PR
        if: steps.check.outputs.has_updates == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPEN="$(gh pr list --search 'chore/update-submodule in:head' --state open --json number --jq 'length')"
          if [[ "$OPEN" -gt 0 ]]; then
            echo "Open submodule update PR already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.has_updates == 'true' && steps.existing.outputs.skip == 'false'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.MPS_BOT_APP_ID }}
          private-key: ${{ secrets.MPS_BOT_PRIVATE_KEY }}

      - name: Create PR
        if: steps.check.outputs.has_updates == 'true' && steps.existing.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="chore/update-submodule-$(date -u +%Y%m%d)"
          NEW_SUBMODULE_SHA="$(git -C vendor/hl-claude-marketplace rev-parse origin/main)"
          PARENT_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          BASE_TREE="$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${PARENT_SHA}" --jq '.tree.sha')"

          # Create tree with updated submodule pointer (gitlink mode 160000)
          NEW_TREE="$(gh api "repos/${GITHUB_REPOSITORY}/git/trees" \
            --input <(jq -n \
              --arg base "$BASE_TREE" \
              --arg sha "$NEW_SUBMODULE_SHA" \
              '{base_tree: $base, tree: [{path: "vendor/hl-claude-marketplace", mode: "160000", type: "commit", sha: $sha}]}') \
            --jq '.sha')"

          # Create commit via API — GitHub signs it automatically
          COMMIT_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/commits" \
            --input <(jq -n \
              --arg msg "chore: update hl-claude-marketplace submodule (${{ steps.check.outputs.old_sha }}..${{ steps.check.outputs.new_sha }})" \
              --arg tree "$NEW_TREE" \
              --arg parent "$PARENT_SHA" \
              '{message: $msg, tree: $tree, parents: [$parent]}') \
            --jq '.sha')"

          # Create branch ref pointing to the signed commit
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            --input <(jq -n \
              --arg ref "refs/heads/${BRANCH}" \
              --arg sha "$COMMIT_SHA" \
              '{ref: $ref, sha: $sha}')

          gh pr create \
            --head "$BRANCH" \
            --title "chore: update hl-claude-marketplace submodule" \
            --body "$(cat <<'EOF'
          Updates `vendor/hl-claude-marketplace` — ${{ steps.check.outputs.commit_count }} new commit(s) (${{ steps.check.outputs.old_sha }} → ${{ steps.check.outputs.new_sha }}).
          EOF
          )"

      - name: Notify Slack
        if: steps.check.outputs.has_updates == 'true' && steps.existing.outputs.skip == 'false'
        run: |
          if [[ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"*Submodule update PR created*\\n\`hl-claude-marketplace\` has ${{ steps.check.outputs.commit_count }} new commit(s) (${{ steps.check.outputs.old_sha }} → ${{ steps.check.outputs.new_sha }})\\n${{ github.server_url }}/${{ github.repository }}/pulls\"}" \
              "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          fi

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [[ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"*update-submodule.yml* failed\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          fi
