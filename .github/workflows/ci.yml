name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Coverage job summary
        if: "!cancelled() && hashFiles('coverage/summary.md') != ''"
        run: cat coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Install lcov
        if: "!cancelled() && github.event_name == 'pull_request' && hashFiles('coverage/lcov.info') != ''"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcapture-tiny-perl libdatetime-perl libtimedate-perl libjson-perl libperlio-gzip-perl > /dev/null
          curl -fsSL https://github.com/linux-test-project/lcov/releases/download/v2.4/lcov-2.4.tar.gz | tar xz
          sudo make -C lcov-2.4 install
          echo "ignore_errors = deprecated" > "$HOME/.lcovrc"

      - name: Coverage PR comment
        if: "!cancelled() && github.event_name == 'pull_request' && hashFiles('coverage/lcov.info') != ''"
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 90
          artifact-name: code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

      - name: Upload coverage artifact
        if: "!cancelled() && hashFiles('coverage/lcov.info') != ''"
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

  changes:
    if: github.event_name == 'pull_request'
    runs-on: warp-ubuntu-latest-x64-2x
    outputs:
      needs_e2e: ${{ steps.filter.outputs.needs_e2e }}
    steps:
      - name: Detect cloud-init-affecting changes
        id: filter
        run: |
          PATHS="templates/cloud-init/"
          CHANGED="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')"
          for prefix in $PATHS; do
            if echo "$CHANGED" | grep -q "^${prefix}"; then
              echo "needs_e2e=true" >> "$GITHUB_OUTPUT"
              echo "E2E needed: changes detected in ${prefix}"
              exit 0
            fi
          done
          echo "needs_e2e=false" >> "$GITHUB_OUTPUT"
          echo "E2E not needed: no cloud-init-affecting changes"
        env:
          GH_TOKEN: ${{ github.token }}

  e2e:
    if: needs.changes.outputs.needs_e2e == 'true'
    needs: [lint-and-test, changes]
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Snap confinement preflight
        run: bash tests/ci-preflight.sh

      - name: E2E test
        run: MPS_E2E_INSTALL=true make test-e2e
