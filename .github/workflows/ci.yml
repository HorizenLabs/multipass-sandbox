name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Coverage job summary
        if: "!cancelled() && hashFiles('coverage/summary.md') != ''"
        run: cat coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Install lcov
        if: "!cancelled() && github.event_name == 'pull_request' && hashFiles('coverage/lcov.info') != ''"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcapture-tiny-perl libdatetime-perl libtimedate-perl libjson-perl libperlio-gzip-perl > /dev/null
          curl -fsSL https://github.com/linux-test-project/lcov/releases/download/v2.4/lcov-2.4.tar.gz | tar xz
          sudo make -C lcov-2.4 install
          echo "ignore_errors = deprecated" > "$HOME/.lcovrc"

      - name: Coverage PR comment
        if: "!cancelled() && github.event_name == 'pull_request' && hashFiles('coverage/lcov.info') != ''"
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 90
          artifact-name: code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

      - name: Upload coverage artifact
        if: "!cancelled() && hashFiles('coverage/lcov.info') != ''"
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

  changes:
    runs-on: warp-ubuntu-latest-x64-2x
    outputs:
      needs_e2e: ${{ steps.detect.outputs.needs_e2e }}
      needs_image_build: ${{ steps.detect.outputs.needs_image_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect e2e-affecting changes
        id: detect
        run: bash .github/scripts/ci-detect-e2e.sh
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BEFORE_SHA: ${{ github.event.before }}

  build-and-e2e:
    if: >-
      needs.changes.outputs.needs_image_build == 'true'
      && (github.event_name == 'push'
          || (github.event_name == 'pull_request'
              && github.event.pull_request.head.repo.full_name == github.repository))
    needs: [lint-and-test, changes]
    runs-on: warp-ubuntu-latest-x64-4x
    environment: build
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup submodule
        env:
          DEPLOY_KEY: ${{ secrets.SUBMODULE_DEPLOY_KEY }}
        run: bash .github/scripts/ci-setup-submodule.sh

      - name: Check KVM
        run: bash .github/scripts/ci-check-kvm.sh

      - name: Snap confinement preflight
        run: bash .github/scripts/ci-preflight.sh

      - name: Build base image
        run: make image-base-amd64

      - name: E2E test with local image
        run: MPS_E2E_IMAGE=images/artifacts/mps-base-amd64.qcow2.img MPS_E2E_INSTALL=true make test-e2e

  e2e:
    if: >-
      needs.changes.outputs.needs_e2e == 'true'
      && needs.changes.outputs.needs_image_build != 'true'
    needs: [lint-and-test, changes]
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Snap confinement preflight
        run: bash .github/scripts/ci-preflight.sh

      - name: E2E test
        run: MPS_E2E_INSTALL=true make test-e2e
