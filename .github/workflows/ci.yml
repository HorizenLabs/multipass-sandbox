name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Coverage job summary
        if: "!cancelled() && hashFiles('coverage/summary.md') != ''"
        run: cat coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage PR comment
        if: "!cancelled() && github.event_name == 'pull_request' && hashFiles('coverage/lcov.info') != ''"
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 70
          artifact-name: code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

      - name: Upload coverage artifact
        if: "!cancelled() && hashFiles('coverage/lcov.info') != ''"
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30
