name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint
        run: make lint

      - name: Test
        run: |
          if [[ -d tests/ ]]; then
            make test
          else
            echo "No tests/ directory yet — skipping."
          fi
