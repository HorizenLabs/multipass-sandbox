#cloud-config
# MPS — Cloud-init customization template
# Uncomment and modify sections below to customize your sandbox.
# This template is used when launching VMs from pre-built mps images.
# For the full provisioning layers, see images/layers/.

# --- Install additional packages ---
# packages:
#   - postgresql-client
#   - redis-tools

# --- Run commands on first boot ---
runcmd:
  # --- Claude Code: enable plugin marketplace skills ---
  # Marketplaces are pre-registered in the image. Enable plugins here.
  # To list available plugins: claude plugin marketplace list
  # To install:  claude plugin install <plugin>@<marketplace>
  # To disable:  claude plugin disable <plugin>@<marketplace>
  # To remove:   claude plugin uninstall <plugin>@<marketplace>
  - |
    sudo -u ubuntu bash -c '
      export HOME=/home/ubuntu
      export PATH="$HOME/.claude/bin:$HOME/.local/bin:$PATH"
      # HorizenLabs marketplace (hl-agent-skills)
      claude plugin install zkverify-product-ideation@hl-agent-skills --scope user
      claude plugin install zkverify-product-development@hl-agent-skills --scope user
      claude plugin install context-utils@hl-agent-skills --scope user
    '
